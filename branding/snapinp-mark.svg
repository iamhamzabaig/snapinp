<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SnapINP Logo Mark</title>
  <desc id="desc">Rounded square gradient badge with a fast interaction pulse and bolt motif.</desc>

  <defs>
    <linearGradient id="bgGradient" x1="96" y1="96" x2="928" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B1426"/>
      <stop offset="1" stop-color="#102B52"/>
    </linearGradient>
    <linearGradient id="pulseGradient" x1="196" y1="512" x2="828" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#4CC9F0"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="softGlow" x="0" y="0" width="1024" height="1024" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feBlend in="SourceGraphic" in2="blur" mode="screen"/>
    </filter>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="208" fill="url(#bgGradient)"/>
  <rect x="128" y="128" width="768" height="768" rx="176" stroke="#28456D" stroke-width="4"/>

  <path
    d="M196 572H330L424 432L534 612L634 462H828"
    stroke="url(#pulseGradient)"
    stroke-width="64"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <path
    d="M624 280L496 488H620L488 744L676 500H556L624 280Z"
    fill="#EAF6FF"
    fill-opacity="0.98"
  />
</svg>
